<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau Auto-Grader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="top-bar">
        <div id="logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M4 4V24H20" stroke="#89b4fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="10" cy="10" r="2" fill="#89b4fa"/>
                <circle cx="16" cy="16" r="2" fill="#89b4fa"/>
                <circle cx="22" cy="8" r="2" fill="#89b4fa"/>
            </svg>
            <span>LUAU GRADER</span>
        </div>
        <div id="tier-selector">
            <button class="tier-btn active" data-tier="beginner" data-tooltip="Basic syntax, deprecated APIs, critical errors">Beginner</button>
            <button class="tier-btn" data-tier="intermediate" data-tooltip="Code style, naming, function length + all Beginner rules">Intermediate</button>
            <button class="tier-btn" data-tier="advanced" data-tooltip="Memory leaks, performance, pooling + all lower tier rules">Advanced</button>
            <button class="tier-btn" data-tier="front_page" data-tooltip="Strict mode, architecture, top 1% standards + all rules">Front Page</button>
        </div>
        <div id="top-actions">
            <button id="grade-btn"><span id="grade-text">GRADE</span><div id="grade-spinner" class="spinner hidden"></div></button>
            <button id="fix-btn" class="hidden" title="Apply all auto-fixes"><span id="fix-text">FIX ALL</span><span id="fix-count" class="fix-count-badge hidden">0</span></button>
            <button id="settings-btn" title="Rule Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <div id="app-body">
        <main id="workspace">
            <section id="code-area">
                <div id="code-tabs">
                    <button class="tab active" data-tab="paste">Paste Code</button>
                    <button class="tab" data-tab="upload">Upload File</button>
                    <span id="file-name-display"></span>
                </div>
                <div id="paste-panel" class="tab-panel active">
                    <div id="editor-wrapper">
                        <div id="line-numbers" aria-hidden="true">1</div>
                        <div id="editor-container">
                            <pre id="highlight-layer" aria-hidden="true"><code id="highlight-code"></code></pre>
                            <textarea id="code-editor" spellcheck="false" placeholder="Paste your Luau code here..."></textarea>
                        </div>
                    </div>
                </div>
                <div id="upload-panel" class="tab-panel">
                    <div id="drop-zone">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <path d="M24 32V16M24 16L18 22M24 16L30 22" stroke="#6c7086" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 32L8 36C8 38.2091 9.79086 40 12 40H36C38.2091 40 40 38.2091 40 36V32" stroke="#6c7086" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <p class="drop-primary">Drag & drop .luau / .lua files</p>
                        <p class="drop-secondary">or</p>
                        <button id="browse-btn">Browse Files</button>
                        <input type="file" id="file-input" accept=".luau,.lua" hidden>
                    </div>
                </div>
            </section>

            <div id="resize-handle"></div>

            <section id="results-panel">
                <div id="results-header">
                    <div id="results-title">
                        <div id="issue-indicator"></div>
                        <span id="issue-count">No issues yet</span>
                    </div>
                    <div id="grade-badge" class="hidden">A+</div>
                </div>
                <div id="diagnostics-list">
                    <div id="empty-state"><p>Grade your code to see diagnostics here</p></div>
                </div>
            </section>
        </main>

        <aside id="settings-panel" class="hidden">
            <div id="settings-header">
                <span>Rule Settings</span>
                <button id="settings-close">&times;</button>
            </div>
            <div id="settings-remember">
                <label><input type="checkbox" id="remember-toggle"> Remember settings</label>
            </div>
            <div id="settings-rules"></div>
        </aside>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="main.js"></script>
</body>
</html>
