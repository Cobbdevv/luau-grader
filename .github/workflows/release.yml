name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p luau-grader-cli
      - run: |
          Copy-Item target/release/luau-grader.exe luau-grader-cli.exe
      - uses: actions/upload-artifact@v4
        with:
          name: luau-grader-cli-windows
          path: luau-grader-cli.exe

  build-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cargo install tauri-cli --version "^2"
      - run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: luau-grader-app-windows
          path: target/release/luau-grader-app.exe

  release:
    needs: [build-cli, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/luau-grader-cli-windows/luau-grader-cli.exe
            artifacts/luau-grader-app-windows/luau-grader-app.exe
